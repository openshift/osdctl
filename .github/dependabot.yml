version: 2
updates:
  - package-ecosystem: gomod
    directory: '/'
    labels:
      - "area/dependency"
      - "ok-to-test"
    allow:
      - dependency-name: "github.com/openshift/osd-network-verifier"
      - dependency-name: "github.com/openshift/backplane-cli"
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
